
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insightforge
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    ports:
      - "5433:5432"

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: InsightForge 
      DEBUG: "False"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/insightforge
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@db:5432/insightforge
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      GROQ_API_KEY: ${GROQ_API_KEY}

    depends_on:
      - db
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"


volumes:
  postgres_data: